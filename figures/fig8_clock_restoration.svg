<svg xmlns="http://www.w3.org/2000/svg" width="860" height="500" viewBox="0 0 860 500" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="860" height="500" fill="#ffffff"/>
  <text x="430" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#111">FIG. 8 — Optical Clock Distribution &amp; Logic-Level Restoration</text>
  <text x="430" y="56" text-anchor="middle" font-size="13" fill="#444">A pump/clock source provides gain so gate outputs are restored and cascadable (Miller criteria)</text>

  <defs>
    <marker id="a8" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#333"/>
    </marker>
  </defs>

  <!-- Pump/clock source -->
  <rect x="40" y="200" width="120" height="90" rx="8" fill="#fff7e0" stroke="#d4a017" stroke-width="2"/>
  <text x="100" y="235" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5c00">80</text>
  <text x="100" y="255" text-anchor="middle" font-size="12" fill="#7a5c00">pump / clock</text>
  <text x="100" y="272" text-anchor="middle" font-size="12" fill="#7a5c00">source</text>

  <!-- Distribution tree -->
  <line x1="160" y1="245" x2="220" y2="245" stroke="#d4a017" stroke-width="4"/>
  <line x1="220" y1="245" x2="220" y2="120" stroke="#d4a017" stroke-width="3"/>
  <line x1="220" y1="245" x2="220" y2="370" stroke="#d4a017" stroke-width="3"/>
  <line x1="220" y1="120" x2="300" y2="120" stroke="#d4a017" stroke-width="3" marker-end="url(#a8)"/>
  <line x1="220" y1="245" x2="300" y2="245" stroke="#d4a017" stroke-width="3" marker-end="url(#a8)"/>
  <line x1="220" y1="370" x2="300" y2="370" stroke="#d4a017" stroke-width="3" marker-end="url(#a8)"/>
  <text x="232" y="200" font-size="10" fill="#a07c10">82 clock fan-out</text>

  <!-- Three gate+amplifier stages -->
  <g>
    <!-- stage 1 -->
    <rect x="300" y="95" width="120" height="50" rx="6" fill="#eef3f8" stroke="#7d8ea0"/>
    <text x="360" y="118" text-anchor="middle" font-size="11" fill="#333">84 gain stage</text>
    <text x="360" y="134" text-anchor="middle" font-size="10" fill="#777">(SOA / Raman / dye)</text>
    <!-- stage 2 -->
    <rect x="300" y="220" width="120" height="50" rx="6" fill="#eef3f8" stroke="#7d8ea0"/>
    <text x="360" y="243" text-anchor="middle" font-size="11" fill="#333">84 gain stage</text>
    <text x="360" y="259" text-anchor="middle" font-size="10" fill="#777">(SOA / Raman / dye)</text>
    <!-- stage 3 -->
    <rect x="300" y="345" width="120" height="50" rx="6" fill="#eef3f8" stroke="#7d8ea0"/>
    <text x="360" y="368" text-anchor="middle" font-size="11" fill="#333">84 gain stage</text>
    <text x="360" y="384" text-anchor="middle" font-size="10" fill="#777">(SOA / Raman / dye)</text>
  </g>

  <!-- weak signal in -->
  <line x1="240" y1="455" x2="300" y2="455" stroke="#ffcf80" stroke-width="3" marker-end="url(#a8)"/>
  <text x="240" y="447" font-size="10" fill="#999">weak gate output</text>

  <!-- restored outputs -->
  <line x1="420" y1="120" x2="500" y2="120" stroke="#ffa000" stroke-width="5" marker-end="url(#a8)"/>
  <line x1="420" y1="245" x2="500" y2="245" stroke="#ffa000" stroke-width="5" marker-end="url(#a8)"/>
  <line x1="420" y1="370" x2="500" y2="370" stroke="#ffa000" stroke-width="5" marker-end="url(#a8)"/>

  <!-- next gate stage -->
  <rect x="500" y="90" width="150" height="320" rx="8" fill="#f7f9fc" stroke="#aab6c4"/>
  <text x="575" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">86 next</text>
  <text x="575" y="148" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">logic plane</text>
  <text x="575" y="250" text-anchor="middle" font-size="11" fill="#555">receives restored,</text>
  <text x="575" y="266" text-anchor="middle" font-size="11" fill="#555">standard-level beams</text>
  <text x="575" y="282" text-anchor="middle" font-size="11" fill="#555">(cascadable)</text>

  <!-- criteria box -->
  <g font-size="11" fill="#333">
    <rect x="680" y="120" width="150" height="260" rx="6" fill="#fff" stroke="#cdd5dd"/>
    <text x="755" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">Restores</text>
    <text x="695" y="170">• fan-out</text>
    <text x="695" y="195">• logic-level</text>
    <text x="705" y="210">restoration</text>
    <text x="695" y="235">• level vs. loss</text>
    <text x="705" y="250">independence</text>
    <text x="695" y="275">• cascadability</text>
    <text x="695" y="300">• I/O isolation</text>
    <text x="695" y="340" font-style="italic" fill="#777">(Miller 2010</text>
    <text x="705" y="356" font-style="italic" fill="#777">criteria)</text>
  </g>
</svg>
