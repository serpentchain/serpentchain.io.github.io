<svg xmlns="http://www.w3.org/2000/svg" width="860" height="640" viewBox="0 0 860 640" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="860" height="640" fill="#ffffff"/>
  <text x="430" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#111">FIG. 5 — Spectral Logic-Gate Embodiments</text>
  <text x="430" y="56" text-anchor="middle" font-size="13" fill="#444">Gates built from coated prism facets (spectral gates, FIG. 4), mirrors, and beam combiners</text>

  <defs>
    <marker id="a5" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#333"/>
    </marker>
  </defs>

  <!-- ===== NOT ===== -->
  <g>
    <text x="120" y="100" font-size="15" font-weight="bold" fill="#111">NOT (inverter)</text>
    <rect x="60" y="120" width="220" height="120" rx="6" fill="#f7f9fc" stroke="#aab6c4"/>
    <!-- input control -->
    <line x1="70" y1="150" x2="150" y2="150" stroke="#7d00ff" stroke-width="4" marker-end="url(#a5)"/>
    <text x="70" y="142" font-size="10" fill="#666">A (&#955;c)</text>
    <!-- constant signal -->
    <line x1="70" y1="210" x2="150" y2="210" stroke="#ffa000" stroke-width="4" marker-end="url(#a5)"/>
    <text x="70" y="225" font-size="10" fill="#666">bias &#955;s</text>
    <!-- gate -->
    <rect x="150" y="135" width="40" height="90" fill="#cdb4f0" stroke="#7a5bb0"/>
    <text x="170" y="185" text-anchor="middle" font-size="10" fill="#3a2a55">gate</text>
    <!-- output -->
    <line x1="190" y1="180" x2="270" y2="180" stroke="#ffa000" stroke-width="4" stroke-dasharray="8 5" marker-end="url(#a5)"/>
    <text x="210" y="172" font-size="10" fill="#666">&#172;A</text>
    <text x="170" y="232" text-anchor="middle" font-size="9" fill="#888">A present &#8594; output blocked</text>
  </g>

  <!-- ===== AND ===== -->
  <g>
    <text x="450" y="100" font-size="15" font-weight="bold" fill="#111">AND (series gates)</text>
    <rect x="390" y="120" width="240" height="120" rx="6" fill="#f7f9fc" stroke="#aab6c4"/>
    <line x1="400" y1="180" x2="455" y2="180" stroke="#ffa000" stroke-width="4" marker-end="url(#a5)"/>
    <text x="400" y="172" font-size="10" fill="#666">&#955;s</text>
    <!-- gate A -->
    <rect x="455" y="140" width="34" height="80" fill="#cdb4f0" stroke="#7a5bb0"/>
    <line x1="472" y1="125" x2="472" y2="140" stroke="#7d00ff" stroke-width="3" marker-end="url(#a5)"/>
    <text x="472" y="120" text-anchor="middle" font-size="10" fill="#666">A</text>
    <line x1="489" y1="180" x2="525" y2="180" stroke="#ffa000" stroke-width="4" marker-end="url(#a5)"/>
    <!-- gate B -->
    <rect x="525" y="140" width="34" height="80" fill="#cdb4f0" stroke="#7a5bb0"/>
    <line x1="542" y1="125" x2="542" y2="140" stroke="#7d00ff" stroke-width="3" marker-end="url(#a5)"/>
    <text x="542" y="120" text-anchor="middle" font-size="10" fill="#666">B</text>
    <line x1="559" y1="180" x2="620" y2="180" stroke="#ffa000" stroke-width="4" stroke-dasharray="8 5" marker-end="url(#a5)"/>
    <text x="585" y="172" font-size="10" fill="#666">A&#8901;B</text>
    <text x="510" y="232" text-anchor="middle" font-size="9" fill="#888">passes only if A AND B open</text>
  </g>

  <!-- ===== OR ===== -->
  <g>
    <text x="120" y="320" font-size="15" font-weight="bold" fill="#111">OR (parallel + combiner)</text>
    <rect x="60" y="340" width="240" height="150" rx="6" fill="#f7f9fc" stroke="#aab6c4"/>
    <!-- path A -->
    <line x1="70" y1="375" x2="120" y2="375" stroke="#ffa000" stroke-width="4" marker-end="url(#a5)"/>
    <rect x="120" y="358" width="32" height="34" fill="#cdb4f0" stroke="#7a5bb0"/>
    <line x1="136" y1="345" x2="136" y2="358" stroke="#7d00ff" stroke-width="3" marker-end="url(#a5)"/>
    <text x="136" y="342" text-anchor="middle" font-size="10" fill="#666">A</text>
    <!-- path B -->
    <line x1="70" y1="450" x2="120" y2="450" stroke="#ffa000" stroke-width="4" marker-end="url(#a5)"/>
    <rect x="120" y="433" width="32" height="34" fill="#cdb4f0" stroke="#7a5bb0"/>
    <line x1="136" y1="420" x2="136" y2="433" stroke="#7d00ff" stroke-width="3" marker-end="url(#a5)"/>
    <text x="136" y="417" text-anchor="middle" font-size="10" fill="#666">B</text>
    <!-- combiner -->
    <polygon points="200,400 230,385 230,415" fill="#dfe7f0" stroke="#7d8ea0"/>
    <line x1="152" y1="375" x2="205" y2="397" stroke="#ffa000" stroke-width="3"/>
    <line x1="152" y1="450" x2="205" y2="403" stroke="#ffa000" stroke-width="3"/>
    <line x1="230" y1="400" x2="290" y2="400" stroke="#ffa000" stroke-width="4" stroke-dasharray="8 5" marker-end="url(#a5)"/>
    <text x="255" y="392" font-size="10" fill="#666">A+B</text>
    <text x="180" y="482" text-anchor="middle" font-size="9" fill="#888">beam combiner merges either path</text>
  </g>

  <!-- ===== XOR ===== -->
  <g>
    <text x="450" y="320" font-size="15" font-weight="bold" fill="#111">XOR (interferometric)</text>
    <rect x="390" y="340" width="240" height="150" rx="6" fill="#f7f9fc" stroke="#aab6c4"/>
    <line x1="400" y1="415" x2="450" y2="415" stroke="#ffa000" stroke-width="4" marker-end="url(#a5)"/>
    <text x="400" y="407" font-size="10" fill="#666">&#955;s</text>
    <!-- splitter -->
    <polygon points="450,400 470,400 460,430" fill="#dfe7f0" stroke="#7d8ea0"/>
    <!-- arm A phase gate -->
    <rect x="490" y="365" width="30" height="28" fill="#cdb4f0" stroke="#7a5bb0"/>
    <text x="505" y="360" text-anchor="middle" font-size="10" fill="#666">A</text>
    <!-- arm B phase gate -->
    <rect x="490" y="437" width="30" height="28" fill="#cdb4f0" stroke="#7a5bb0"/>
    <text x="505" y="478" text-anchor="middle" font-size="10" fill="#666">B</text>
    <line x1="460" y1="405" x2="490" y2="379" stroke="#ffa000" stroke-width="3"/>
    <line x1="460" y1="425" x2="490" y2="451" stroke="#ffa000" stroke-width="3"/>
    <!-- recombine -->
    <polygon points="560,400 580,400 570,430" fill="#dfe7f0" stroke="#7d8ea0"/>
    <line x1="520" y1="379" x2="565" y2="405" stroke="#ffa000" stroke-width="3"/>
    <line x1="520" y1="451" x2="565" y2="425" stroke="#ffa000" stroke-width="3"/>
    <line x1="570" y1="415" x2="620" y2="415" stroke="#ffa000" stroke-width="4" stroke-dasharray="8 5" marker-end="url(#a5)"/>
    <text x="592" y="407" font-size="10" fill="#666">A&#8853;B</text>
    <text x="510" y="482" text-anchor="middle" font-size="9" fill="#888">phase shift &#8594; constructive/destructive</text>
  </g>

  <!-- legend -->
  <g font-size="11" fill="#444">
    <rect x="60" y="530" width="740" height="80" rx="6" fill="#fff" stroke="#cdd5dd"/>
    <rect x="80" y="548" width="26" height="12" fill="#ffa000"/><text x="114" y="558">signal beam &#955;s (data)</text>
    <rect x="320" y="548" width="26" height="12" fill="#7d00ff"/><text x="354" y="558">control beam &#955;c (operand)</text>
    <rect x="80" y="575" width="26" height="12" fill="#cdb4f0" stroke="#7a5bb0"/><text x="114" y="585">spectral gate (coated facet, FIG. 4)</text>
    <line x1="320" y1="581" x2="346" y2="581" stroke="#ffa000" stroke-width="4" stroke-dasharray="8 5"/><text x="354" y="585">gated / conditional output</text>
  </g>
</svg>
