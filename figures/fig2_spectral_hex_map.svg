    <rect x="360" y="419" width="360" height="35" fill="#f0e000" stroke="#cdd5dd"/>
    <!-- A -->
    <rect x="40"  y="454" width="80" height="35" fill="#fafbfc" stroke="#cdd5dd"/><text x="80" y="476" text-anchor="middle" font-weight="bold">A</text>
    <rect x="120" y="454" width="120" height="35" fill="#fafbfc" stroke="#cdd5dd"/><text x="180" y="476" text-anchor="middle">CH10</text>
    <rect x="240" y="454" width="120" height="35" fill="#fafbfc" stroke="#cdd5dd"/><text x="300" y="476" text-anchor="middle">596</text>
    <rect x="360" y="454" width="360" height="35" fill="#ffd000" stroke="#cdd5dd"/>
    <!-- B -->
    <rect x="40"  y="489" width="80" height="35" fill="#fafbfc" stroke="#cdd5dd"/><text x="80" y="511" text-anchor="middle" font-weight="bold">B</text>
    <rect x="120" y="489" width="120" height="35" fill="#fafbfc" stroke="#cdd5dd"/><text x="180" y="511" text-anchor="middle">CH11</text>
    <rect x="240" y="489" width="120" height="35" fill="#fafbfc" stroke="#cdd5dd"/><text x="300" y="511" text-anchor="middle">615</text>
    <rect x="360" y="489" width="360" height="35" fill="#ffa000" stroke="#cdd5dd"/>
    <!-- C -->
    <rect x="40"  y="524" width="80" height="35" fill="#fafbfc" stroke="#cdd5dd"/><text x="80" y="546" text-anchor="middle" font-weight="bold">C</text>
    <rect x="120" y="524" width="120" height="35" fill="#fafbfc" stroke="#cdd5dd"/><text x="180" y="546" text-anchor="middle">CH12</text>
    <rect x="240" y="524" width="120" height="35" fill="#fafbfc" stroke="#cdd5dd"/><text x="300" y="546" text-anchor="middle">634</text>
    <rect x="360" y="524" width="360" height="35" fill="#ff6a00" stroke="#cdd5dd"/>
    <!-- D -->
    <rect x="40"  y="559" width="80" height="35" fill="#fafbfc" stroke="#cdd5dd"/><text x="80" y="581" text-anchor="middle" font-weight="bold">D</text>
    <rect x="120" y="559" width="120" height="35" fill="#fafbfc" stroke="#cdd5dd"/><text x="180" y="581" text-anchor="middle">CH13</text>
    <rect x="240" y="559" width="120" height="35" fill="#fafbfc" stroke="#cdd5dd"/><text x="300" y="581" text-anchor="middle">653</text>
    <rect x="360" y="559" width="360" height="35" fill="#ff3000" stroke="#cdd5dd"/>
    <!-- E -->
    <rect x="40"  y="594" width="80" height="35" fill="#fafbfc" stroke="#cdd5dd"/><text x="80" y="616" text-anchor="middle" font-weight="bold">E</text>
    <rect x="120" y="594" width="120" height="35" fill="#fafbfc" stroke="#cdd5dd"/><text x="180" y="616" text-anchor="middle">CH14</text>
