    <rect x="360" y="594" width="360" height="35" fill="#e00000" stroke="#cdd5dd"/>
    <!-- F -->
    <rect x="40"  y="629" width="80" height="35" fill="#fafbfc" stroke="#cdd5dd"/><text x="80" y="651" text-anchor="middle" font-weight="bold">F</text>
    <rect x="120" y="629" width="120" height="35" fill="#fafbfc" stroke="#cdd5dd"/><text x="180" y="651" text-anchor="middle">CH15</text>
    <rect x="240" y="629" width="120" height="35" fill="#fafbfc" stroke="#cdd5dd"/><text x="300" y="651" text-anchor="middle">690</text>
